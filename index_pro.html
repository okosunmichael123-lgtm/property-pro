<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Estimator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #result { margin-top: 20px; font-weight: bold; text-align: center; font-size: 18px; }
        #maintenance-plan { display: none; margin-top: 20px; border: 1px solid #e67e22; padding: 15px; border-radius: 8px; background-color: #fff9f4; }
    </style>
</head>
<body>

<div class="card">
    <h2>Property Estimator</h2>
    <p>Consultant: <strong>Michael Okosun</strong></p>
    <input type="number" id="sqm" placeholder="Enter Total Area (sqm)">
    <input type="number" id="rate" placeholder="Enter Rate per sqm (₦)">
    <button onclick="calculate()">Calculate Estimate</button>
    <div id="result"></div>
    
    <div id="maintenance-plan">
        <h3 style="color: #e67e22;">🛡️ 5-Year Legacy Maintenance Plan</h3>
        <p id="y1"></p>
        <p id="y3"></p>
        <p id="y5"></p>
    </div>

    <div id="actions" style="display:none; margin-top:20px;">
        <button onclick="generatePDF()" style="background-color: #28a745;">Download PDF Report</button>
    </div>
</div>

<script>
    function calculate() {
        const sqm = document.getElementById('sqm').value;
        const rate = document.getElementById('rate').value;
        if (sqm && rate) {
            const total = sqm * rate;
            document.getElementById('result').innerHTML = "Total Estimate: ₦" + total.toLocaleString();
            
            const mBase = total * 0.015;
            document.getElementById('y1').innerText = "Year 1 (Fumigation): ₦" + (mBase * 0.4).toLocaleString();
            document.getElementById('y3').innerText = "Year 3 (Painting): ₦" + (mBase * 1.1).toLocaleString();
            document.getElementById('y5').innerText = "Year 5 (Audit): ₦" + (mBase * 1.8).toLocaleString();
            
            document.getElementById('maintenance-plan').style.display = "block";
            document.getElementById('actions').style.display = "block";
        }
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Grab values directly from the boxes to avoid the "180" error
        const sqm = document.getElementById('sqm').value;
        const rate = document.getElementById('rate').value;
        const total = sqm * rate;
        const mBase = total * 0.015;

        doc.setFontSize(18);
        doc.text("PROPERTY ESTIMATION REPORT", 20, 20);
        doc.setFontSize(12);
        doc.text("------------------------------------------", 20, 30);
        doc.text(`Consultant: Michael Okosun`, 20, 40);
        doc.text(`Total Area: ${sqm} sqm`, 20, 50);
        doc.text(`Rate per sqm: N${Number(rate).toLocaleString()}`, 20, 60);
        doc.text(`TOTAL ESTIMATE: N${total.toLocaleString()}`, 20, 80);
        doc.text("------------------------------------------", 20, 90);
        
        doc.setFontSize(14);
        doc.text("--- 5-YEAR LEGACY MAINTENANCE PLAN ---", 20, 110);
        doc.setFontSize(12);
        doc.text(`Year 1 (Fumigation): N${(mBase * 0.4).toLocaleString()}`, 20, 125);
        doc.text(`Year 3 (Painting): N${(mBase * 1.1).toLocaleString()}`, 20, 135);
        doc.text(`Year 5 (Audit): N${(mBase * 1.8).toLocaleString()}`, 20, 145);
        
        doc.text("Thank you for using our digital planning services.", 20, 165);
        doc.save("Property_Estimate_Okosun.pdf");
    }
</script>
</body>
</html>
