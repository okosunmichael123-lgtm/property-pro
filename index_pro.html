<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Estimator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 20px; }
        #result { margin-top: 25px; padding: 15px; background: #e8f0fe; border-radius: 8px; font-size: 20px; font-weight: bold; text-align: center; color: #1a73e8; display: none; }
        .maintenance-section { display: none; margin-top: 25px; border: 2px solid #e67e22; padding: 20px; border-radius: 10px; background-color: #fff9f4; }
        .plan-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #fee; }
        .btn-wa { background-color: #25d366; }
        .btn-pdf { background-color: #28a745; }
    </style>
</head>
<body>

<div class="card">
    <h2>Property Estimator</h2>
    <p style="text-align: center;">Consultant: <strong>Michael Okosun</strong></p>
    
    <label for="sqm">Total Area (sqm):</label>
    <input type="number" id="sqm" placeholder="e.g. 150">
    
    <label for="rate">Rate per sqm (₦):</label>
    <input type="number" id="rate" placeholder="e.g. 200000">
    
    <button onclick="calculate()">Calculate Estimate</button>
    
    <div id="result"></div>
    
    <div id="maintenance-section" class="maintenance-section">
        <h3 style="color: #e67e22; text-align: center;">🛡️ 5-Year Legacy Maintenance Plan</h3>
        <div class="plan-row"><span>Year 1 (Fumigation):</span> <span id="y1" style="font-weight:bold; color:#27ae60;"></span></div>
        <div class="plan-row"><span>Year 3 (Painting):</span> <span id="y3" style="font-weight:bold; color:#27ae60;"></span></div>
        <div class="plan-row"><span>Year 5 (Audit):</span> <span id="y5" style="font-weight:bold; color:#27ae60;"></span></div>
    </div>

    <div id="actions" style="display:none;">
        <button onclick="generatePDF()" class="btn-pdf">Download PDF Report</button>
        <button onclick="sendWhatsApp()" class="btn-wa">Send to Michael on WhatsApp</button>
    </div>
</div>

<script>
    function calculate() {
        const sqm = document.getElementById('sqm').value;
        const rate = document.getElementById('rate').value;
        
        if (sqm && rate) {
            const total = sqm * rate;
            document.getElementById('result').style.display = "block";
            document.getElementById('result').innerHTML = "Total Estimate: ₦" + total.toLocaleString();
            
            const mBase = total * 0.015;
            document.getElementById('y1').innerText = "₦" + (mBase * 0.4).toLocaleString();
            document.getElementById('y3').innerText = "₦" + (mBase * 1.1).toLocaleString();
            document.getElementById('y5').innerText = "₦" + (mBase * 1.8).toLocaleString();
            
            document.getElementById('maintenance-section').style.display = "block";
            document.getElementById('actions').style.display = "block";
        }
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // GRAB LIVE DATA: This stops the "180 sqm" error
        const currentSqm = document.getElementById('sqm').value;
        const currentRate = document.getElementById('rate').value;
        const currentTotal = currentSqm * currentRate;
        const mBase = currentTotal * 0.015;

        doc.setFontSize(22);
        doc.setTextColor(26, 115, 232);
        doc.text("PROPERTY ESTIMATION REPORT", 20, 25);
        
        doc.setFontSize(12);
        doc.setTextColor(0, 0, 0);
        doc.text(`Consultant: Michael Okosun`, 20, 45);
        doc.text(`Total Area: ${currentSqm} sqm`, 20, 55);
        doc.text(`Rate per sqm: N${Number(currentRate).toLocaleString()}`, 20, 65);
        doc.text(`TOTAL ESTIMATE: N${currentTotal.toLocaleString()}`, 20, 85);
        
        doc.text("--- 5-YEAR LEGACY MAINTENANCE PLAN ---", 20, 110);
        doc.text(`Year 1 (Fumigation): N${(mBase * 0.4).toLocaleString()}`, 20, 125);
        doc.text(`Year 3 (Painting): N${(mBase * 1.1).toLocaleString()}`, 20, 135);
        doc.text(`Year 5 (Audit): N${(mBase * 1.8).toLocaleString()}`, 20, 145);

        doc.save("Property_Estimate_Okosun.pdf");
    }

    function sendWhatsApp() {
        const sqm = document.getElementById('sqm').value;
        const rate = document.getElementById('rate').value;
        const total = sqm * rate;
        
        // REPLACE THE NUMBER BELOW WITH YOUR REAL PHONE NUMBER
        const myPhoneNumber = "2348137842306"; 
        
        const message = `Hello Hon. Michael Okosun, \n\nI have a property estimate: \nTotal Area: ${sqm} sqm\nRate: N${Number(rate).toLocaleString()}\nTotal Estimate: ₦${total.toLocaleString()}\n\nPlease contact me for the Digital Planning.`;
        
        window.open(`https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
    }
</script>
</body>
</html>
